<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>Dashboard Debito Pubblico Italia</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b1220;
  color:white;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:40px 20px;
  text-align:center;
}

h1{
  margin-bottom:30px;
}

/* GRID STABILE */
.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap:20px;
}

/* CARD ANTI-SOVRAPPOSIZIONE */
.card{
  background:#111a2e;
  padding:20px;
  border-radius:16px;

  display:flex;
  flex-direction:column;
  justify-content:center;

  min-height:140px;   /* 🔥 BLOCCA COLLASSO */
  overflow:hidden;
}

/* LABEL */
.label{
  font-size:14px;
  color:#9ca3af;
  margin-bottom:10px;
}

/* VALORE STABILE */
.value{
  font-size:26px;
  font-weight:bold;
  line-height:1.2;   /* 🔥 EVITA SOVRAPPOSIZIONE */
  word-break:break-word;
  color:#22c55e;
}

/* BIG VALUE */
.big{
  font-size:38px;
}

</style>

</head>

<body>

<div class="container">

<h1>📊 Finanza Pubblica Italia</h1>

<div class="grid">

  <div class="card">
    <div class="label">Debito Pubblico</div>
    <div class="value big" id="debito">--</div>
  </div>

  <div class="card">
    <div class="label">Debito / PIL</div>
    <div class="value" id="ratio">--</div>
  </div>

  <div class="card">
    <div class="label">Interessi annui</div>
    <div class="value" id="interessi">--</div>
  </div>

  <div class="card">
    <div class="label">Debito pro-capite</div>
    <div class="value" id="procapite">--</div>
  </div>

</div>

</div>

<script>

const DEBITO_BASE = 3024000000000;
const PIL = 2200000000000;
const POP = 58900000;

const GROWTH_SEC = 2500;
const START = new Date("2026-01-01");

function euro(x){
  return x.toLocaleString("it-IT",{
    style:"currency",
    currency:"EUR",
    maximumFractionDigits:0
  });
}

function update(){

  const now = new Date();
  const sec = (now - START) / 1000;

  const debito = DEBITO_BASE + sec * GROWTH_SEC;

  const ratio = (debito / PIL) * 100;
  const interessi = debito * 0.035;
  const pro = debito / POP;

  document.getElementById("debito").innerText = euro(debito);
  document.getElementById("ratio").innerText = ratio.toFixed(1) + "%";
  document.getElementById("interessi").innerText = euro(interessi);
  document.getElementById("procapite").innerText = euro(pro);
}

update();
setInterval(update, 1000);

</script>

</body>
</html>
